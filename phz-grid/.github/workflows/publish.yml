name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Typecheck
        run: npx tsc --build

      - name: Run tests
        run: npx vitest run

      - name: Build all packages
        run: npm run build

      - name: Build CDN bundles
        working-directory: packages/grid
        run: |
          npx vite build
          npx vite build --config vite.cdn-all.config.ts

      - name: Publish packages
        run: npx workspaces-run -- npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
